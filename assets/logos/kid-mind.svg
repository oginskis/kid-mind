<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon: abstract document + neural network -->
  <g transform="translate(4, 4)">
    <!-- Document shape -->
    <rect x="4" y="2" width="30" height="40" rx="6" fill="none" stroke="url(#glow)" stroke-width="1.8" opacity="0.6"/>
    <path d="M24 2 L34 12 L24 12 Z" fill="none" stroke="url(#glow)" stroke-width="1.2" stroke-linejoin="round" opacity="0.4"/>
    <!-- Neural nodes -->
    <circle cx="14" cy="16" r="3" fill="#00D4AA" opacity="0.9" filter="url(#soft-glow)"/>
    <circle cx="26" cy="14" r="2.2" fill="#0891B2" opacity="0.8"/>
    <circle cx="12" cy="28" r="2.2" fill="#0891B2" opacity="0.8"/>
    <circle cx="24" cy="27" r="3" fill="#00D4AA" opacity="0.9" filter="url(#soft-glow)"/>
    <circle cx="18" cy="37" r="1.8" fill="#06B6D4" opacity="0.7"/>
    <!-- Neural connections -->
    <line x1="14" y1="16" x2="26" y2="14" stroke="#00D4AA" stroke-width="0.8" opacity="0.35"/>
    <line x1="14" y1="16" x2="12" y2="28" stroke="#00D4AA" stroke-width="0.8" opacity="0.35"/>
    <line x1="14" y1="16" x2="24" y2="27" stroke="#06B6D4" stroke-width="0.8" opacity="0.3"/>
    <line x1="26" y1="14" x2="24" y2="27" stroke="#06B6D4" stroke-width="0.8" opacity="0.3"/>
    <line x1="12" y1="28" x2="24" y2="27" stroke="#00D4AA" stroke-width="0.8" opacity="0.35"/>
    <line x1="12" y1="28" x2="18" y2="37" stroke="#06B6D4" stroke-width="0.8" opacity="0.25"/>
    <line x1="24" y1="27" x2="18" y2="37" stroke="#06B6D4" stroke-width="0.8" opacity="0.25"/>
  </g>
  <!-- Text -->
  <text x="52" y="26" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#E8EAED" letter-spacing="-0.5">kid</text>
  <text x="88" y="26" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#00D4AA" letter-spacing="-0.5">mind</text>
  <!-- Tagline -->
  <text x="52" y="44" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#9AA0A6" letter-spacing="1.5" text-transform="uppercase">KID DOCUMENT INTELLIGENCE</text>
</svg>
